    <style>
        :root { 
            --conj-purple: #a29bfe; 
            --conj-bg: #fff9f0; 
            --success: #55efc4; 
            --error: #ff7675; 
            --text-dark: #2d3436;
        }
        
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', "Comic Neue", sans-serif; 
            background-color: var(--conj-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            color: var(--text-dark);
        }

        #game-box { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            border: 4px solid var(--text-dark);
            box-shadow: 10px 10px 0px var(--text-dark);
            width: 100%; 
            max-width: 780px; 
            position: relative;
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            margin-bottom: 20px; 
            font-size: 1.2rem;
        }

        .instruction { 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #636e72; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
        }

        .sentence-display { 
            font-size: 1.6rem; 
            line-height: 1.6; 
            color: var(--text-dark); 
            margin-bottom: 30px; 
            padding: 40px 30px; 
            background: #fdfdfd; 
            border-radius: 15px; 
            text-align: center; 
            border: 3px dashed #dfe6e9; 
        }

        .blank { 
            color: var(--conj-purple); 
            font-weight: bold; 
            text-decoration: underline;
            padding: 0 5px; 
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .btn { 
            background: #fff; 
            border: 3px solid var(--text-dark); 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.1s; 
            font-size: 1.2rem; 
            color: var(--text-dark);
            box-shadow: 4px 4px 0px var(--text-dark);
            font-family: inherit;
        }

        .btn:hover:not(:disabled) { 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--text-dark);
            background: #fafaff;
        }

        .btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--text-dark);
        }

        .btn.correct { 
            background: var(--success) !important; 
        }

        .btn.wrong { 
            background: var(--error) !important; 
            color: white; 
        }

        #next-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--conj-purple); 
            color: var(--text-dark); 
            border: 3px solid var(--text-dark);
            border-radius: 12px; 
            margin-top: 25px; 
            cursor: pointer; 
            display: none; 
            font-weight: bold; 
            font-size: 1.3rem;
            font-family: inherit;
            box-shadow: 5px 5px 0px var(--text-dark);
        }

        #next-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--text-dark);
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <button id="next-btn">Connect Next →</button>

        {s: "We should go now <span class='blank'>___</span> we get stuck in the heavy evening traffic.", a: "before", d: ["after", "until", "since"]},

    ];

    let current = 0; let score = 0; let deck = [];

    function init() {
        // Randomize the 80 questions
        deck = [...conjunctionData].sort(() => Math.random() - 0.5);
        current = 0; score = 0;
        document.getElementById('score').textContent = "0";
        load();
    }

    function load() {
        if(current >= deck.length) { 
            alert("Conjunction King! You've mastered all 80 rounds. Final Score: " + score + "/80"); 
            init(); return; 
        }
        const item = deck[current];
        document.getElementById('sentence').innerHTML = item.s;
        document.getElementById('progress').textContent = `${current + 1}/${deck.length}`;
        
        const box = document.getElementById('choices');
        box.innerHTML = "";
        let choices = [item.a, ...item.d].sort(() => Math.random() - 0.5);
        
        choices.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(btn => btn.disabled = true);
                if(opt === item.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); }); }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => {
        document.getElementById('next-btn').style.display = "none";
        current++; load();
    };

    init();
</script>
