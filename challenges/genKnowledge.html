        :root {

        body {

            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            color: var(--echo-dark);
        }

        #game-box { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            border: 4px solid var(--echo-dark);
            box-shadow: 10px 10px 0px var(--echo-dark); 
            width: 100%; 
            max-width: 850px; 
            text-align: center;
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            margin-bottom: 25px; 
            color: var(--echo-indigo);
            font-size: 1.2rem;
        }
        
        .question-display { 
            font-size: 1.5rem; 
            line-height: 1.5; 
            color: var(--echo-dark); 
            background: #fff9c4; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border: 3px dashed #fbc02d;
            font-weight: 800; 
            min-height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .label { 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            color: #636e72; 
            margin-bottom: 12px; 
            display: block; 
            letter-spacing: 1px;
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        /* Updated Option Button Hover */
        .btn { 
            background: #fff; 
            border: 3px solid var(--echo-dark); 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.1s; 
            color: var(--echo-dark); 
            font-size: 1rem; 
            font-family: inherit;
            box-shadow: 4px 4px 0px var(--echo-dark);
            text-align: center;
        }
        
        .btn:hover:not(:disabled) { 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--echo-dark);
            background: var(--hover-playful) !important; /* Playful Golden! */
            border-color: var(--echo-indigo);
        }

        .btn.correct { background: var(--success) !important; border-color: var(--echo-dark); }
        .btn.wrong { background: var(--error) !important; color: white; border-color: var(--echo-dark); }
        
        /* Updated Next Button Hover */
        #next-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--echo-indigo); 
            color: white; 
            border: 3px solid var(--echo-dark); 
            border-radius: 12px; 
            margin-top: 25px; 
            cursor: pointer; 
            display: none; 
            font-weight: bold; 
            font-size: 1.2rem;
            font-family: inherit;
            box-shadow: 5px 5px 0px var(--echo-dark);
        }

        #next-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--echo-dark);
            background: var(--hover-playful) !important; /* Playful Golden! */
            color: var(--echo-dark);
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        {q: "Scotland's monster loch.", a: "Ness", o: ["Lomond", "Tay", "Katrine"]},
        {q: "Donkey's other name.", a: "Ass", o: ["Mule", "Pony", "Horse"]},
        {q: "Sugar cane drink.", a: "Rum", o: ["Gin", "Vodka", "Wine"]},
        {q: "Smuggled goods.", a: "Contraband", o: ["Imports", "Exports", "Freight"]},
        {q: "Astronaut travels in...", a: "Space", o: ["Ocean", "Air", "Desert"]},
        {q: "Cricket bat wood.", a: "Willow", o: ["Oak", "Ash", "Maple"]},
        {q: "Lightest common metal.", a: "Lithium", o: ["Aluminium", "Iron", "Gold"]},
        {q: "NASA's field.", a: "Space Exploration", o: ["Deep Sea", "Medical Research", "Cooking"]},
        {q: "Man Friday's master.", a: "Robinson Crusoe", o: ["Captain Hook", "Peter Pan", "Long John Silver"]},
        {q: "Planet closest to sun.", a: "Mercury", o: ["Venus", "Earth", "Mars"]},
        {q: "Empire State Building city.", a: "New York", o: ["Chicago", "Miami", "Boston"]},
        {q: "Closest planet to Sun.", a: "Mercury", o: ["Mars", "Jupiter", "Venus"]},
        {q: " Erin is...", a: "Ireland", o: ["England", "Wales", "Scotland"]},
        {q: "Baker's dozen is...", a: "13", o: ["12", "11", "10"]},
        {q: "Adult human teeth.", a: "32", o: ["28", "30", "34"]},
        {q: "Frozen water.", a: "Ice", o: ["Hail", "Snow", "Mist"]},
        {q: "Hexagon sides.", a: "6", o: ["5", "7", "8"]},
        {q: "Arab chief.", a: "Sheik", o: ["Priest", "King", "Monk"]},
        {q: "Egg yellow.", a: "Yolk", o: ["White", "Shell", "Skin"]},
        {q: "Exit sign means...", a: "Way out", o: ["Way in", "Stay", "Danger"]},
        {q: "Giraffe neck is...", a: "Long", o: ["Short", "Wide", "Thin"]},
        {q: "Veal is from...", a: "Calf", o: ["Pig", "Sheep", "Cow"]},
        {q: "Pacific is an...", a: "Ocean", o: ["Island", "River", "Sea"]},
        {q: "Apple center.", a: "Core", o: ["Pit", "Skin", "Seed"]}
    ];

    let current = 0; let score = 0; 
    let deck = [...fullGkData].sort(() => Math.random() - 0.5).slice(0, 200);

    function load() {
        const item = deck[current];
        document.getElementById('question-target').textContent = item.q;
        document.getElementById('progress').textContent = `${current + 1}/200`;
        const box = document.getElementById('choices');
        box.innerHTML = "";
        
        let choices = [item.a, ...item.o].sort(() => Math.random() - 0.5);
        
        choices.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(btn => btn.disabled = true);
                if(opt === item.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); }); }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => {
        document.getElementById('next-btn').style.display = "none";
        current++; 
        if(current < deck.length) load(); 
        else {
            document.getElementById('game-box').innerHTML = `<h2>Gauntlet Champion!</h2><p>You have conquered 200 rounds of general knowledge.<br>Final Score: ${score}/200</p><button onclick="location.reload()" class="btn" style="width:100%">Restart Challenge</button>`;
        }
    };

    load();
</script>
</body>
</html>
