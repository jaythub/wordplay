    <meta charset="UTF-8">
    <title>Wonders of the World | 80 Rounds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wonder-indigo: #6c5ce7; 
            --wonder-yellow: #feca57;
            --wonder-dark: #2d3436; 
            --wonder-bg: #fffbf0;
            --success: #55efc4; 
            --error: #ff7675;
            --hover-yellow: #fff4d3;
        }

        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', "Comic Neue", sans-serif; 
            background-color: var(--wonder-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            color: var(--wonder-dark);
        }

        #game-box { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            border: 4px solid var(--wonder-dark);
            box-shadow: 10px 10px 0px var(--wonder-dark); 
            width: 100%; 
            max-width: 800px; 
            text-align: center;
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            margin-bottom: 25px; 
            color: var(--wonder-indigo);
            font-size: 1.2rem;
        }

        .label { 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #636e72; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 1.5px; 
            display: block;
        }
        
        .wonder-display { 
            font-size: 1.4rem; 
            line-height: 1.6; 
            color: var(--wonder-dark); 
            background: #f8f9ff; 
            padding: 35px; 
            border-radius: 15px; 
            border: 3px dashed var(--wonder-indigo); 
            margin-bottom: 30px; 
            font-weight: bold;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .btn { 
            background: #fff; 
            border: 3px solid var(--wonder-dark); 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.1s; 
            font-family: inherit; 
            font-size: 1.1rem; 
            color: var(--wonder-dark);
            box-shadow: 4px 4px 0px var(--wonder-dark);
        }

        .btn:hover:not(:disabled) { 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--wonder-dark);
            background: var(--hover-yellow);
            border-color: var(--wonder-indigo);
        }

        .btn.correct { background: var(--success) !important; border-color: var(--wonder-dark); }
        .btn.wrong { background: var(--error) !important; color: white; border-color: var(--wonder-dark); }

        #next-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--wonder-indigo); 
            color: white; 
            border: 3px solid var(--wonder-dark); 
            border-radius: 12px; 
            margin-top: 25px; 
            cursor: pointer; 
            display: none; 
            font-weight: bold; 
            font-size: 1.3rem;
            font-family: inherit;
            box-shadow: 5px 5px 0px var(--wonder-dark);
        }

        #next-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--wonder-dark);
            background: #5b4cc4;
        }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="game-box">
    <div class="stats"><span>Score: <span id="score">0</span> 🏛️</span><span id="progress">1/80</span></div>
    <span class="label">The Description:</span>
    <div class="wonder-display" id="target">...</div>
    <span class="label">Identify the Wonder:</span>
    <div class="options-grid" id="choices"></div>
    <button id="next-btn">Next Wonder →</button>
</div>

        {q: "A medieval castle in Germany that inspired the Disney Sleeping Beauty castle.", a: "Neuschwanstein Castle", o: ["Hohenzollern Castle", "Bran Castle", "Wartburg Castle"]},

        {q: "A stunning fjord in New Zealand's South Island, described by Rudyard Kipling as the eighth wonder.", a: "Milford Sound", o: ["Doubtful Sound", "Geirangerfjord", "Misty Fjords"]},
        {q: "A natural light display in the Earth's sky, predominantly seen in high-latitude regions.", a: "Northern Lights (Aurora Borealis)", o: ["Meteor Shower", "Solar Eclipse", "The Milky Way"]},
        {q: "The ancient capital of the Nabataean Kingdom, hidden behind a narrow canyon called the Siq.", a: "Petra", o: ["Persepolis", "Babylon", "Nineveh"]},
        {q: "A giant landmark limestone monolith in the Strait of Gibraltar.", a: "Rock of Gibraltar", o: ["Sugarloaf Mountain", "Table Mountain", "The Needles"]},
        {q: "The world's largest hot spring, located in Yellowstone National Park.", a: "Grand Prismatic Spring", o: ["Old Faithful", "Mammoth Hot Springs", "Blue Lagoon"]},
        {q: "A spectacular group of waterfalls on the border between Brazil and Argentina.", a: "Iguazu Falls", o: ["Niagara Falls", "Victoria Falls", "Kaieteur Falls"]},
        {q: "An ancient ceremonial center in the highlands of Mexico, known for the 'Avenue of the Dead'.", a: "Teotihuacan", o: ["Monte Alban", "Cholula", "Tula"]},
        {q: "A white marble bell tower in Italy famous for its unintended tilt.", a: "Leaning Tower of Pisa", o: ["Giotto's Campanile", "Torre Mangia", "Big Ben"]},

        {q: "A unique geological formation in Turkey known for 'fairy chimneys' and cave dwellings.", a: "Cappadocia", o: ["Pamukkale", "Meteora", "Giant's Causeway"]},
        {w: "Mount Rushmore", q: "A colossal sculpture carved into the granite face of a mountain in South Dakota.", a: "Mount Rushmore", o: ["Crazy Horse Memorial", "Stone Mountain", "Mount Lee"]},
        {q: "A massive set of 40,000 interlocking basalt columns in Northern Ireland.", a: "Giant's Causeway", o: ["Fingal's Cave", "Staffa", "Devils Postpile"]},
        {q: "The world's largest religious monument, covering 162 hectares.", a: "Angkor Wat", o: ["Borobudur", "Vatican City", "Karnak Temple"]},

    ];

    let current = 0; let score = 0; 
    let deck = [...wonderData].sort(() => Math.random() - 0.5);

    function load() {
        const item = deck[current];
        document.getElementById('target').textContent = item.q;
        document.getElementById('progress').textContent = `${current + 1}/80`;
        const box = document.getElementById('choices');
        box.innerHTML = "";
        
        let choices = [item.a, ...item.o].sort(() => Math.random() - 0.5);
        
        choices.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(btn => btn.disabled = true);
                if(opt === item.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); }); }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => {
        document.getElementById('next-btn').style.display = "none";
        current++; 
        if(current < 80) load(); 
        else {
            document.getElementById('game-box').innerHTML = `<h2>Explorer of the World!</h2><p>You have identified 80 wonders from across the globe.<br>Final Score: ${score}/80</p><button onclick="location.reload()" class="btn" style="width:100%">Journey Again</button>`;
        }
    };

    load();
</script>
