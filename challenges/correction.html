    <meta charset="UTF-8">

    <title>Sentence Surgeon | 70 Rounds</title>

    <style>
        :root { 
            --surgeon-teal: #4ecdc4; 
            --surgeon-bg: #fff9f0; 
            --success: #55efc4; 
            --error: #ff7675; 
            --text-dark: #2d3436;
        }
        
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', "Comic Neue", sans-serif; 
            background-color: var(--surgeon-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            color: var(--text-dark);
        }

        #game-box { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            border: 4px solid var(--text-dark);
            box-shadow: 10px 10px 0px var(--text-dark);
            width: 100%; 
            max-width: 800px; 
            position: relative;
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            margin-bottom: 20px; 
            font-size: 1.2rem;
        }

        .instruction { 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #636e72; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            text-align: center;
        }

        .sentence-display { 
            font-size: 1.6rem; 
            line-height: 1.5; 
            color: var(--text-dark); 
            margin-bottom: 30px; 
            padding: 30px; 
            background: #fdfdfd; 
            border-radius: 15px; 
            text-align: center; 
            border: 3px dashed var(--surgeon-teal); 
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
        }

        .btn { 
            background: #fff; 
            border: 3px solid var(--text-dark); 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.1s; 
            font-size: 1.1rem; 
            color: var(--text-dark);
            box-shadow: 4px 4px 0px var(--text-dark);
            font-family: inherit;
            text-align: left;
        }

        .btn:hover:not(:disabled) { 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--text-dark);
            background: #f0fffe;
        }

        .btn.correct { background: var(--success) !important; }
        .btn.wrong { background: var(--error) !important; color: white; }

        #next-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--surgeon-teal); 
            color: var(--text-dark); 
            border: 3px solid var(--text-dark);
            border-radius: 12px; 
            margin-top: 25px; 
            cursor: pointer; 
            display: none; 
            font-weight: bold; 
            font-size: 1.3rem;
            font-family: inherit;
            box-shadow: 5px 5px 0px var(--text-dark);
        }

        #next-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--text-dark); }
    </style>
</head>
<body>
<div id="game-box">
    <div class="stats">
        <span>Score: <span id="score">0</span> 🏆</span>
        <span id="progress">1/70</span>
    </div>
    <div class="instruction">Select the grammatically correct version:</div>
    <div class="sentence-display" id="sentence">...</div>
    <div id="choices" class="options-grid"></div>
    <button id="next-btn">Perform Next Surgery →</button>
</div>

<script>

        {f: "One of my friend is coming over.", a: "One of my friends is coming over.", d: ["One of my friend is coming over.", "One of my friends are coming over.", "A friend of mine are coming over."]},

        {f: "He is more cleverer than his sister.", a: "He is cleverer than his sister.", d: ["He is more cleverer than his sister.", "He is much cleverer than his sister.", "He is more clever than his sister."]},
        {f: "The teacher told the students to not talk.", a: "The teacher told the students not to talk.", d: ["The teacher told the students to not talk.", "The teacher told the students they don't talk.", "The teacher said the students not to talk."]},
        {f: "He enjoys to play tennis on Sundays.", a: "He enjoys playing tennis on Sundays.", d: ["He enjoys to play tennis on Sundays.", "He enjoys for playing tennis on Sundays.", "He enjoy playing tennis on Sundays."]},

        {f: "If it will rain, we shall stay at home.", a: "If it rains, we shall stay at home.", d: ["If it will rain, we shall stay at home.", "If it would rain, we shall stay at home.", "If it rain, we shall stay at home."]},

        {f: "You must to finish your homework.", a: "You must finish your homework.", d: ["You must to finish your homework.", "You must finishing your homework.", "You have to must finish your homework."]},
        {f: "He is the most cleverest boy in class.", a: "He is the cleverest boy in the class.", d: ["He is the most cleverest boy in class.", "He is the most clever boy in class.", "He is more cleverest than the boys."]},

        {f: "I told him that I will come.", a: "I told him that I would come.", d: ["I told him that I will come.", "I tell him that I would come.", "I told to him I would come."]},

        {f: "It is me who did it.", a: "It is I who did it.", d: ["It is me who did it.", "It is myself who did it.", "It's me whom did it."]},
        {f: "Who are you talking to?", a: "To whom are you talking?", d: ["Who are you talking to?", "Whom you are talking to?", "To who are you talking?"]},
        {f: "He has no place to live in.", a: "He has no place to live.", d: ["He has no place to live in.", "He has no place for living.", "He has no place in which to live."]},
        {f: "Did you saw the movie?", a: "Did you see the movie?", d: ["Did you saw the movie.", "Have you saw the movie?", "Did you seen the movie?"]},
        {f: "She is more better than her friend.", a: "She is better than her friend.", d: ["She is more better than her friend.", "She is much better than her friend.", "She is better then her friend."]},

    ];

    let current = 0; let score = 0; let deck = [];

    function init() {
        deck = [...correctionData].sort(() => Math.random() - 0.5);
        current = 0; score = 0;
        document.getElementById('score').textContent = "0";
        load();
    }

    function load() {
        if(current >= deck.length) { 
            alert("Elite Surgeon Status Achieved! All 70 Cases Solved. Final Score: " + score + "/70"); 
            init(); return; 
        }
        const item = deck[current];
        document.getElementById('sentence').textContent = item.f;
        document.getElementById('progress').textContent = `${current + 1}/${deck.length}`;
        
        const box = document.getElementById('choices');
        box.innerHTML = "";
        let choices = [item.a, ...item.d].sort(() => Math.random() - 0.5);
        
        choices.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(btn => btn.disabled = true);
                if(opt === item.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); }); }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => {
        document.getElementById('next-btn').style.display = "none";
        current++; load();
    };

    init();
</script>

</html>
