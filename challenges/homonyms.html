        {s: "He <span class='blank'>____</span> a <span class='blank'>____</span> of bread.", a: "needs — loaf", d: ["kneads — loaf", "needs — life", "kneads — life"]},
        {s: "The baker <span class='blank'>____</span> the dough before baking.", a: "kneads", d: ["needs", "nodes", "nods"]},
        {s: "I <span class='blank'>____</span> the <span class='blank'>____</span> of the bell.", a: "hear — toll", d: ["here — toll", "hear — tail", "here — tail"]}
    ];

    let current = 0; let score = 0; let deck = [];

    function init() {
        deck = [...dataset].sort(() => Math.random() - 0.5);
        current = 0; score = 0;
        document.getElementById('score').textContent = "0";
        load();
    }

    function load() {
        if(current >= deck.length) { 
            alert("Homonym Legend! You finished 125 rounds. Final Score: " + score); 
            init(); return; 
        }
        const item = deck[current];
        document.getElementById('sentence-area').innerHTML = item.s;
        document.getElementById('progress').textContent = `${current + 1}/125`;
        const box = document.getElementById('choices');
        box.innerHTML = "";
        
        let choices = [item.a, ...item.d].sort(() => Math.random() - 0.5);
        
        choices.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(btn => btn.disabled = true);
                if(opt === item.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); }); }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => {
        document.getElementById('next-btn').style.display = "none";
        current++; load();
    };
    init();
</script>
</body>
</html>
