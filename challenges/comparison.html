    <style>
        :root {
            --bg-color: #fff9f0;
            --weaver-teal: #00897b;
            --card-yellow: #feca57;
            --card-red: #ff6b6b;
            --card-blue: #4ecdc4;
            --text-dark: #2d3436;
            --paper: #ffffff;
            --success: #2ecc71;
            --error: #e74c3c;
            /* Duel Theme Colors */
            --btn-wine: #722f37;
            --btn-brown: #5d4037;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', "Comic Neue", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--weaver-teal) 0.5px, transparent 0);
            background-size: 30px 30px;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        #game-box {
            background: var(--paper);
            border: 5px solid var(--text-dark);
            border-radius: 30px;
            box-shadow: 12px 12px 0px var(--text-dark);
            padding: 35px;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .stats {
            display: flex; justify-content: space-between;
            font-weight: 900; margin-bottom: 20px;
            font-size: 1.2rem; text-transform: uppercase;
        }

        .instruction-header {
            text-align: center; font-weight: 900;
            color: #636e72; text-transform: uppercase;
            margin-bottom: 15px; letter-spacing: 1px;
            font-size: 1rem;
        }

        .sentence-display {
            background: var(--card-yellow);
            padding: 30px; border-radius: 20px;
            margin-bottom: 25px; text-align: center;
            border: 5px solid var(--text-dark);
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
            font-size: 1.5rem; line-height: 1.5;
            font-weight: 700; color: #000;
        }

        .wrong-word { 
            color: var(--card-red); 
            text-decoration: underline; 
            font-weight: 900; 
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn {
            background: white; border: 4px solid var(--text-dark);
            padding: 15px; border-radius: 15px;
            font-family: inherit; font-weight: 900; cursor: pointer;
            transition: all 0.1s ease; color: var(--text-dark);
            font-size: 1.2rem; box-shadow: 5px 5px 0px var(--text-dark);
        }

        .btn:hover:not(:disabled) {
            background-color: var(--card-blue);
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--text-dark);
        }

        .btn.correct { background-color: var(--success) !important; color: white; }
        .btn.wrong { background-color: var(--error) !important; color: white; }

        #next-btn {
            width: 100%; padding: 20px;
            background-color: var(--btn-wine) !important;
            color: white !important; border: 4px solid var(--text-dark);
            border-radius: 15px; margin-top: 25px; cursor: pointer;
            display: none; font-weight: 900; font-family: inherit;
            font-size: 1.4rem; box-shadow: 6px 6px 0px var(--text-dark);
            text-transform: uppercase;
        }

        #next-btn:hover {
            background-color: var(--btn-brown) !important;
            transform: translateY(-2px);
            box-shadow: 8px 8px 0px var(--text-dark);
        }
    </style>
</head>

    let current = 0; let score = 0;
    let deck = [...compData].sort(() => Math.random() - 0.5);

    function load() {
        const item = deck[current];
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('progress').textContent = `${current + 1}/${deck.length}`;
        document.getElementById('sentence').innerHTML = item.w;
        
        const box = document.getElementById('choices');
        box.innerHTML = "";
        
        // Always 4 options
        let options = [item.a, ...item.d].sort(() => Math.random() - 0.5);
        
        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                document.querySelectorAll('.btn').forEach(btn => btn.disabled = true);
                if(opt === item.a) { b.classList.add('correct'); score++; }
                else { 
                    b.classList.add('wrong'); 
                    document.querySelectorAll('.btn').forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); });
                }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => {
        current++;
        if(current < deck.length) load();
        else {
            document.getElementById('game-box').innerHTML = `
                <h1 style="color:var(--weaver-teal); text-align:center;">Duel Complete! 🏆</h1>

                <button onclick="location.reload()" class="btn" style="width:100%">Challenge Again</button>
            `;
        }
    };

    load();
