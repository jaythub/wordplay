    <meta charset="UTF-8">

    <title>The Contextual Echo | 62 Rounds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --echo-indigo: #6c5ce7; 
            --echo-dark: #2d3436; 
            --echo-bg: #fff9f0;
            --success: #55efc4; 
            --error: #ff7675;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', "Comic Neue", sans-serif; 
            background-color: var(--echo-bg);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
            color: var(--echo-dark);
        }

        #game-box {
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px;
            border: 4px solid var(--echo-dark);
            box-shadow: 10px 10px 0px var(--echo-dark);
            width: 100%;
            max-width: 650px; 
            text-align: center;
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            margin-bottom: 25px; 
            color: var(--echo-indigo);
            font-size: 1.2rem;
        }

        .sentence-display {
            font-size: 1.5rem; 
            font-weight: bold; 
            line-height: 1.6;
            margin-bottom: 30px; 
            padding: 25px;
            background: #f8f9ff;
            border-radius: 15px;
            border: 3px dashed var(--echo-indigo);
            min-height: 100px;
            /* Using standard block display to keep underscores in-line with text */
            display: block;
            text-align: center;
        }

        .blank-space { 
            color: var(--echo-indigo); 
            font-weight: 800; 
            white-space: nowrap;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: #fff;
            border: 3px solid var(--echo-dark);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 1rem;
            color: var(--echo-dark);
            font-family: inherit;
            box-shadow: 4px 4px 0px var(--echo-dark);
        }

        .btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--echo-dark);
            background: #f0f7ff;
        }

        .btn.correct { background: var(--success) !important; border-color: var(--echo-dark); }
        .btn.wrong { background: var(--error) !important; color: white; border-color: var(--echo-dark); }

        #next-btn {
            width: 100%;
            padding: 18px;
            background: var(--echo-indigo);
            color: white;
            border: 3px solid var(--echo-dark);
            border-radius: 12px;
            margin-top: 25px;
            cursor: pointer;
            display: none;
            font-weight: bold;
            font-size: 1.3rem;
            font-family: inherit;
            box-shadow: 5px 5px 0px var(--echo-dark);
        }

        #next-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--echo-dark); }
        
        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="game-box">

        <span>Score: <span id="score">0</span> 🏆</span>
        <span id="progress">1/62</span>

    <div class="sentence-display" id="sentence-box">Loading Challenges...</div>
    <div id="choices" class="options-grid"></div>
    <button id="next-btn">Next Challenge →</button>
</div>

        { s: "He gave his <span class='blank-space'>_____</span> to the performance.", a: "heart and soul", o: ["heart and soul", "might and main", "tooth and nail", "body and soul"] },

    const extraData = [
        { s: "The company went to <span class='blank-space'>_____</span> after the CEO resigned.", a: "rack and ruin", o: ["rack and ruin", "bits and pieces", "odds and ends", "null and void"] },
        { s: "He attacked the enemy <span class='blank-space'>_____</span>.", a: "hip and thigh", o: ["hip and thigh", "tooth and nail", "hand and foot", "might and main"] },
        { s: "The contract was signed <span class='blank-space'>_____</span>.", a: "fair and square", o: ["fair and square", "null and void", "hard and fast", "high and dry"] },
        { s: "The weather was <span class='blank-space'>_____</span> during our vacation.", a: "on and off", o: ["on and off", "high and low", "in and out", "here and there"] },

        { s: "It was an <span class='blank-space'>_____</span> victory.", a: "out and out", o: ["out and out", "far and away", "high and dry", "one and only"] },
        { s: "They were <span class='blank-space'>_____</span> in the race.", a: "neck and neck", o: ["neck and neck", "step by step", "face to face", "hand in hand"] }
    ];

    let current = 0; let score = 0; let deck = [];

    function init() {
        deck = [...fullMasterSet, ...extraData].sort(() => Math.random() - 0.5);
        current = 0; score = 0;
        document.getElementById('score').textContent = "0";
        load();
    }

    function load() {
        if(current >= deck.length) { 
            document.getElementById('game-box').innerHTML = `<h2>Legendary Mastery!</h2><p>All 62 Challenges Completed!<br>Final Score: ${score}/${deck.length}</p><button onclick="location.reload()" class="btn" style="width:100%">Play Again</button>`;
            return; 
        }
        const item = deck[current];
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('progress').textContent = `${current + 1}/${deck.length}`;
        
        // Keeps underscores exactly as they appear in the data
        document.getElementById('sentence-box').innerHTML = item.s;
        
        const box = document.getElementById('choices');
        box.innerHTML = "";
        
        item.o.sort(() => Math.random() - 0.5).forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(btn => btn.disabled = true);
                if(opt === item.a) { 
                    b.classList.add('correct'); score++; 
                } else { 
                    b.classList.add('wrong'); 
                    btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); });
                }
                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });
    }

    document.getElementById('next-btn').onclick = () => { current++; load(); };

    init();
</script>
