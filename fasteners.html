<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8MRM0K6T2T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8MRM0K6T2T');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Joiner | Fasteners & Connections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --echo-indigo: #6c5ce7; 
            --echo-dark: #2d3436; 
            --echo-bg: #fff9f0;
            --success: #55efc4; 
            --error: #ff7675;
            --hover-indigo: #f0edff; /* Added hover color variable */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', "Comic Neue", sans-serif; 
            background-color: var(--echo-bg);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
            color: var(--echo-dark);
        }

        #game-container {
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px;
            border: 4px solid var(--echo-dark);
            box-shadow: 10px 10px 0px var(--echo-dark);
            width: 100%;
            max-width: 500px; 
            text-align: center;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-weight: bold;
            color: var(--echo-indigo);
            font-size: 1.1rem;
        }

        .question-area {
            background: #f8f9ff;
            border-radius: 15px;
            border: 3px dashed var(--echo-indigo);
            padding: 20px;
            margin-bottom: 30px;
        }

        .prompt { 
            color: #636e72; 
            font-size: 1rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .target-word { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: var(--echo-dark); 
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .btn {
            background: #fff;
            border: 3px solid var(--echo-dark);
            padding: 18px 10px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            color: var(--echo-dark);
            font-family: inherit;
            box-shadow: 4px 4px 0px var(--echo-dark);
        }

        /* Updated hover state with color */
        .btn:hover:not(:disabled) { 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--echo-dark);
            background: var(--hover-indigo);
            border-color: var(--echo-indigo);
        }

        .btn.correct { background: var(--success) !important; border-color: var(--echo-dark); }
        .btn.wrong { background: var(--error) !important; color: white; border-color: var(--echo-dark); }

        #next-btn {
            margin-top: 25px;
            width: 100%;
            padding: 18px;
            background: var(--echo-indigo);
            color: white;
            border: 3px solid var(--echo-dark);
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            font-family: inherit;
            box-shadow: 5px 5px 0px var(--echo-dark);
        }

        #next-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--echo-dark);
            background: #5b4cc4; /* Slightly darker indigo for next button hover */
        }

        #feedback { 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 1.1rem;
            min-height: 1.5rem; 
            color: var(--echo-indigo);
        }

        @media (max-width: 400px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <span>Score: <span id="score">0</span> 🏆</span>
        <span id="progress">0/36</span>
    </div>

    <div class="question-area">
        <div id="prompt" class="prompt">What is used to secure...</div>
        <div id="target" class="target-word">---</div>
    </div>

    <div class="options-grid" id="choices-container"></div>
    <button id="next-btn">Continue Workshop →</button>
    <div id="feedback"></div>
</div>

<script>
    const fastenerData = [
        { item: "Trousers", fastener: "Belt" },
        { item: "Gate or pieces of wood/metal", fastener: "Bolt" },
        { item: "Trousers (Straps)", fastener: "Braces" },
        { item: "Dress or Kilt", fastener: "Brooch" },
        { item: "Shirt, blouse or dress", fastener: "Button" },
        { item: "Ship's anchor", fastener: "Cable" },
        { item: "Bricks (Hardening)", fastener: "Cement" },
        { item: "Anchor (Metal links)", fastener: "Chain" },
        { item: "Paper", fastener: "Clip" },
        { item: "Dressing-gown", fastener: "Girdle" },
        { item: "Wood, paper or leather", fastener: "Glue" },
        { item: "Wrists", fastener: "Handcuffs" },
        { item: "Horse and cart", fastener: "Harness" },
        { item: "Ship (Mooring)", fastener: "Hawsers" },
        { item: "Door", fastener: "Hinge" },
        { item: "Hook", fastener: "Eye" },
        { item: "Shoe or boot", fastener: "Lace" },
        { item: "Window or door", fastener: "Latch" },
        { item: "Door, safe or suitcase", fastener: "Lock" },
        { item: "Bricks or stonework", fastener: "Mortar" },
        { item: "Wood", fastener: "Nail" },
        { item: "Gate or box", fastener: "Padlock" },
        { item: "Wallpaper", fastener: "Paste" },
        { item: "Tent ropes", fastener: "Peg" },
        { item: "Window glass", fastener: "Putty" },
        { item: "Metal plates", fastener: "Rivet" },
        { item: "Sail", fastener: "Rope" },
        { item: "Metal (Fusing)", fastener: "Solder" },
        { item: "Paper or fencing", fastener: "Staple" },
        { item: "Shoe, bag or belt", fastener: "Strap and buckle" },
        { item: "Parcel", fastener: "String" },
        { item: "Wings of aircraft", fastener: "Strut" },
        { item: "Floor coverings", fastener: "Tack" },
        { item: "Clothing (Stitching)", fastener: "Thread" },
        { item: "Large parcel", fastener: "Twine" },
        { item: "Clothes (Track)", fastener: "Zip" }
    ];

    let deck = [];
    let score = 0;
    let played = 0;
    let currentCorrect = "";

    function shuffle() {
        deck = [...fastenerData].sort(() => Math.random() - 0.5);
        played = 0;
    }

    function loadNext() {
        if (deck.length === 0) {
            document.getElementById('game-container').innerHTML = `
                <h2 style="color:var(--echo-indigo)">Fastener Master!</h2>
                <p>You've completed all 36 connections.</p>
                <p>Final Score: ${score}/36</p>
                <button onclick="location.reload()" class="btn" style="width:100%">Restart Workshop</button>
            `;
            return;
        }

        const pair = deck.pop();
        played++;
        const isObjectToFastener = Math.random() > 0.5;
        
        document.getElementById('progress').textContent = `${played}/${fastenerData.length}`;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('feedback').textContent = "";
        
        currentCorrect = isObjectToFastener ? pair.fastener : pair.item;
        document.getElementById('prompt').textContent = isObjectToFastener ? "What is used to secure..." : "What is traditionally secured with...";
        document.getElementById('target').textContent = isObjectToFastener ? pair.item : pair.fastener;

        const container = document.getElementById('choices-container');
        container.innerHTML = "";

        let choices = [currentCorrect];
        while (choices.length < 4) {
            let r = fastenerData[Math.floor(Math.random() * fastenerData.length)];
            let val = isObjectToFastener ? r.fastener : r.item;
            if (!choices.includes(val)) choices.push(val);
        }
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = text;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.btn');
                btns.forEach(b => b.disabled = true);
                if (text === currentCorrect) {
                    btn.classList.add('correct');
                    score++;
                    document.getElementById('score').textContent = score;
                    document.getElementById('feedback').innerHTML = "✨ Correct Connection!";
                } else {
                    btn.classList.add('wrong');
                    document.getElementById('feedback').innerHTML = `Oops! Correct answer: <span style="color:var(--echo-indigo)">${currentCorrect}</span>`;
                    btns.forEach(b => { if(b.textContent === currentCorrect) b.classList.add('correct'); });
                }
                document.getElementById('next-btn').style.display = "block";
            };
            container.appendChild(btn);
        });
    }

    document.getElementById('next-btn').onclick = loadNext;
    shuffle();
    loadNext();
</script>
</body>
</html>
