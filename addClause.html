    <style>
        :root { 
            --magic-purple: #8e44ad; 
            --story-bg: #fdf0d5; 
            --success-green: #27ae60; 
            --oops-red: #e74c3c; 
            --sky-blue: #3498db;
            --ink-black: #2c3e50;
            --paper-white: #ffffff;

            background: var(--story-bg); 
            background-image: radial-gradient(#666 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
        }

        #game-box { 
            background: var(--paper-white); 
            padding: 2.5rem; 
            border-radius: 40px; 
            box-shadow: 0 15px 0px #d5bdaf, 0 25px 50px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 800px; 
            border: 6px solid var(--ink-black);
            position: relative;
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-weight: 900; 
            margin-bottom: 25px; 
            color: var(--magic-purple);
            font-size: 1.2rem;
        }

        .instruction-tag { 
            background: var(--sky-blue); 
            padding: 5px 20px; 
            border-radius: 50px; 
            font-weight: bold; 
            color: white; 
            display: inline-block; 
            font-size: 0.8rem;
            border: 3px solid var(--ink-black);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .clause-goal { 
            font-size: 1.2rem; 
            color: var(--ink-black); 
            background: #fff9c4;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 25px; 
            font-weight: bold;
            border: 3px dashed var(--ink-black);
            text-align: center;
        }

        .sentence-display { 
            font-size: 1.8rem; 
            line-height: 1.5; 
            color: var(--ink-black); 
            margin-bottom: 30px; 
            padding: 40px; 
            background: #fafafa; 
            border-radius: 20px; 
            text-align: center; 
            border: 4px solid var(--ink-black);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .connector { 
            color: var(--magic-purple); 
            font-weight: bold;
            text-decoration: underline wavy;
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
        }

        .btn { 
            background: white; 
            border: 4px solid var(--ink-black); 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.1s ease-out; 
            font-size: 1.2rem; 
            color: var(--ink-black);
            box-shadow: 0 6px 0 var(--ink-black);
            font-family: inherit;
            text-align: left;
        }

        .btn:hover:not(:disabled) { 
            background: #fff3e0; 
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--ink-black);
        }

        .btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--ink-black);
        }

        .btn.correct { background: var(--success-green) !important; color: white; }
        .btn.wrong { background: var(--oops-red) !important; color: white; }

        #next-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--magic-purple); 
            color: white; 
            border: 4px solid var(--ink-black); 
            border-radius: 20px; 
            margin-top: 30px; 
            cursor: pointer; 
            display: none; 
            font-weight: 900; 
            font-size: 1.3rem;
            box-shadow: 0 6px 0 var(--ink-black);
            font-family: inherit;
        }
    </style>
</head>

        const item = deck[current];
        document.getElementById('sentence').innerHTML = `${item.base} <span class="connector">...</span> ${item.end || ""}`;
        document.getElementById('goal').textContent = item.goal;
        document.getElementById('progress').textContent = `${current + 1}/100`;
        
        const box = document.getElementById('choices');
        box.innerHTML = "";
        let choices = [item.a, ...item.d].sort(() => Math.random() - 0.5);
        
        choices.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = document.querySelectorAll('.btn');

                    score++; 
                } else { 
                    b.classList.add('wrong'); 
                    btns.forEach(btn => { if(btn.textContent === item.a) btn.classList.add('correct'); });

                document.getElementById('score').textContent = score;
                document.getElementById('next-btn').style.display = "block";

            box.appendChild(b);
